version: '3.9'

services:
  # Development service with hot-reload
  radiocalico-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: radiocalico-dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - radiocalico-db-dev:/app/db
    environment:
      - NODE_ENV=development
    networks:
      - radiocalico-network
    command: npm run dev

  # Production PostgreSQL database
  radiocalico-db-postgres:
    image: postgres:16-alpine
    container_name: radiocalico-db-postgres
    environment:
      POSTGRES_DB: radiocalico
      POSTGRES_USER: radiocalico
      POSTGRES_PASSWORD: radiocalico
    volumes:
      - radiocalico-db-postgres-data:/var/lib/postgresql/data
    networks:
      - radiocalico-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radiocalico -d radiocalico"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Production API backend (Express only, no static files)
  radiocalico-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: radiocalico-api
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      DB_HOST: radiocalico-db-postgres
      DB_PORT: 5432
      DB_NAME: radiocalico
      DB_USER: radiocalico
      DB_PASSWORD: radiocalico
    depends_on:
      radiocalico-db-postgres:
        condition: service_healthy
    networks:
      - radiocalico-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # Production web server (nginx reverse proxy)
  radiocalico-web:
    image: nginx:alpine
    container_name: radiocalico-web
    ports:
      - "3001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/app/public:ro
    depends_on:
      - radiocalico-api
    networks:
      - radiocalico-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  radiocalico-db-dev:
    driver: local
  radiocalico-db-postgres-data:
    driver: local

networks:
  radiocalico-network:
    driver: bridge
