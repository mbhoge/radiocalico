name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 build-essential

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (rating system)
        run: npm test -- tests/routes.rating.test.js tests/db.rating.test.js

      - name: Generate coverage report
        run: npm run test:coverage -- tests/routes.rating.test.js tests/db.rating.test.js
        continue-on-error: true

      - name: Start server
        run: node src/server.js &
        timeout-minutes: 1

      - name: Wait for server to start
        run: sleep 2

      - name: Test health endpoint
        run: curl -f http://localhost:3000/api/health || exit 1

      - name: Test now-playing endpoint
        run: |
          curl -X POST http://localhost:3000/api/now-playing \
            -H "Content-Type: application/json" \
            -d '{"title":"Test Song","artist":"Test Artist"}' \
            -f || exit 1

      - name: Test rating submission
        run: |
          curl -X POST http://localhost:3000/api/rate \
            -H "Content-Type: application/json" \
            -d '{"sessionId":"test-session","title":"Test Song","artist":"Test Artist","rating":1}' \
            -f || exit 1

      - name: Test rating retrieval
        run: |
          curl -f "http://localhost:3000/api/ratings/Test%20Song?sessionId=test-session&artist=Test%20Artist" || exit 1

      - name: Test HLS manifest
        run: curl -f http://localhost:3000/live.m3u8 || exit 1

      - name: Test HLS segment
        run: curl -f http://localhost:3000/segment-0.ts -o /dev/null || exit 1

      - name: Test static assets
        run: |
          curl -f http://localhost:3000/ -o /dev/null || exit 1
          curl -f http://localhost:3000/style.css -o /dev/null || exit 1
          curl -f http://localhost:3000/logo.png -o /dev/null || exit 1

      - name: Stop server
        run: pkill -f "node src/server.js" || true
