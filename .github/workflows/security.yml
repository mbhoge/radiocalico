name: Security & Dependencies

on:
  push:
    branches: [ master, main, develop ]
    paths: [ 'package*.json' ]
  pull_request:
    branches: [ master, main, develop ]
    paths: [ 'package*.json' ]
  schedule:
    - cron: '0 0 * * *'

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
